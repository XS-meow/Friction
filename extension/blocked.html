<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friction — Stay Focused</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background gradient */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(120, 60, 255, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 60, 120, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(60, 180, 255, 0.06) 0%, transparent 50%);
      animation: gradientShift 8s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes gradientShift {
      0% { opacity: 0.6; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.1); }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 520px;
      padding: 2rem;
    }

    /* Glowing icon */
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(120, 60, 255, 0.2), rgba(255, 60, 120, 0.2));
      border: 2px solid rgba(120, 60, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      animation: iconPulse 2s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(120, 60, 255, 0.2); }
      50% { box-shadow: 0 0 40px rgba(120, 60, 255, 0.4); }
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #e4e4e7, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1.05rem;
      color: #71717a;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .blocked-domain {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      background: rgba(255, 60, 120, 0.1);
      border: 1px solid rgba(255, 60, 120, 0.2);
      border-radius: 6px;
      color: #fb7185;
      font-weight: 600;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    /* Countdown ring */
    .countdown-container {
      margin: 2rem auto;
      position: relative;
      width: 140px;
      height: 140px;
    }

    .countdown-ring {
      width: 140px;
      height: 140px;
      transform: rotate(-90deg);
    }

    .countdown-ring circle {
      fill: none;
      stroke-width: 4;
    }

    .countdown-ring .bg {
      stroke: rgba(255, 255, 255, 0.06);
    }

    .countdown-ring .progress {
      stroke: url(#countdown-gradient);
      stroke-linecap: round;
      stroke-dasharray: 408;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }

    .countdown-number {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #e4e4e7;
    }

    .countdown-label {
      font-size: 0.85rem;
      color: #71717a;
      margin-top: 0.5rem;
    }

    /* Buttons */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1.5rem;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 25px rgba(124, 58, 237, 0.4);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.05);
      color: #a1a1aa;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #e4e4e7;
    }

    .btn-proceed {
      background: rgba(255, 60, 120, 0.1);
      color: #fb7185;
      border: 1px solid rgba(255, 60, 120, 0.2);
    }

    .btn-proceed:hover {
      background: rgba(255, 60, 120, 0.15);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
    }

    .hidden {
      display: none !important;
    }

    /* Fade-in animation */
    .container {
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>

  <div class="container">
    <div class="icon">🛡️</div>

    <h1>You're in a focus session</h1>
    <p class="subtitle">
      This site is blocked to help you stay focused.<br />
      Take a breath. Go back to what matters.
    </p>
    <div class="blocked-domain" id="blocked-domain"></div>

    <div class="countdown-container">
      <svg class="countdown-ring" viewBox="0 0 140 140">
        <defs>
          <linearGradient id="countdown-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7c3aed" />
            <stop offset="100%" stop-color="#ec4899" />
          </linearGradient>
        </defs>
        <circle class="bg" cx="70" cy="70" r="65" />
        <circle class="progress" id="progress-ring" cx="70" cy="70" r="65" />
      </svg>
      <div class="countdown-number" id="countdown-number">10</div>
    </div>
    <p class="countdown-label" id="countdown-label">You can proceed after the countdown</p>

    <div class="actions">
      <button class="btn btn-primary" id="btn-go-back" onclick="goBack()">
        ← Go back to work
      </button>
      <button class="btn btn-proceed hidden" id="btn-proceed" onclick="proceedAnyway()">
        Proceed anyway (logged)
      </button>
    </div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
