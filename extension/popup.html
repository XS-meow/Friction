<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friction</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      width: 320px;
      min-height: 200px;
      background: #0f0f14;
      color: #e4e4e7;
      overflow: hidden;
    }

    .popup {
      padding: 1.25rem;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(120, 60, 255, 0.2), rgba(255, 60, 120, 0.2));
      border: 1px solid rgba(120, 60, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }

    .header h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header .version {
      font-size: 0.7rem;
      color: #52525b;
      margin-left: auto;
    }

    /* Status Card */
    .status-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-label {
      font-size: 0.8rem;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .status-badge.inactive {
      background: rgba(113, 113, 122, 0.15);
      color: #71717a;
    }

    .status-badge.active {
      background: rgba(34, 197, 94, 0.12);
      color: #4ade80;
      animation: activePulse 2s ease-in-out infinite;
    }

    @keyframes activePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .status-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Timer display */
    .timer-display {
      text-align: center;
      padding: 1rem 0;
      display: none;
    }

    .timer-display.visible {
      display: block;
    }

    .timer-value {
      font-size: 2rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .timer-label {
      font-size: 0.75rem;
      color: #52525b;
      margin-top: 0.25rem;
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .stat {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      padding: 0.7rem;
      text-align: center;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e4e4e7;
    }

    .stat-label {
      font-size: 0.65rem;
      color: #52525b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 0.15rem;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 0.75rem;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .btn-start {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.25);
    }

    .btn-start:hover {
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
      transform: translateY(-1px);
    }

    .btn-end {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .btn-end:hover {
      background: rgba(239, 68, 68, 0.15);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <div class="header">
      <div class="header-icon">🎯</div>
      <h1>Friction</h1>
      <span class="version">v0.1.0</span>
    </div>

    <!-- Status -->
    <div class="status-card">
      <div class="status-row">
        <span class="status-label">Session</span>
        <span class="status-badge inactive" id="status-badge">
          <span class="dot"></span>
          <span id="status-text">Inactive</span>
        </span>
      </div>
      <div class="timer-display" id="timer-display">
        <div class="timer-value" id="timer-value">00:00</div>
        <div class="timer-label">remaining</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat">
        <div class="stat-value" id="distractions-count">0</div>
        <div class="stat-label">Distractions</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="overrides-count">0</div>
        <div class="stat-label">Overrides</div>
      </div>
    </div>

    <!-- Action Button -->
    <button class="btn btn-start" id="btn-start" onclick="handleStart()">
      ▶ Start 10-min session
    </button>
    <button class="btn btn-end hidden" id="btn-end" onclick="handleEnd()">
      ■ End session
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
